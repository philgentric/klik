plugins {
    id 'java'

    // not required with the beryx runtime plugin
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
    //id("com.gradleup.shadow") version "9.0.0-beta11"

    // if modular:
    //id 'org.beryx.jlink' version '3.0.1'
    // non modular:
    //https://badass-runtime-plugin.beryx.org/releases/latest/
    //id 'org.beryx.runtime' version '1.13.1'

    //id 'org.graalvm.buildtools.native' version '0.10.5'

    id("com.github.johnrengelman.shadow") version "8.1.1"
}


/*
ext {
    javacppPlatform = 'macosx-arm64'
}
*/

group = 'klik'
version = '0.9'


// this is REQUIRED with a JDK that does not bundle javaFX

javafx {
    version = "23.0.2"
    modules = [ 'javafx.controls', 'javafx.fxml', 'javafx.swing','javafx.graphics','javafx.media','javafx.web' ]
}



repositories {
    mavenCentral()
}

/*compileJava {
    // this is needed to enable the virtual threads preview feature in java20
    //options.compilerArgs += ['--enable-preview']
    options.compilerArgs += ['-Xlint:-options']
}*/

/*
java {
    sourceCompatibility = JavaVersion.VERSION_23
    targetCompatibility = JavaVersion.VERSION_23
}
*/

dependencies {
    // EXIF reader
    implementation 'com.drewnoakes:metadata-extractor:2.19.0'
      // Cache
    implementation group: 'com.github.ben-manes.caffeine', name: 'caffeine', version: '3.2.0'

    // moving folders across different drives
    implementation group: 'commons-io', name: 'commons-io', version: '2.19.0'

    // for face recognition: gson is used to serialise the feature vectors between the python server and this app
    implementation 'com.google.code.gson:gson:2.11.0'

}

