// these "tasks.register" items work only with a JDK that bundles javafx such as 23.0.2.fx-zulu
tasks.register('klik', JavaExec) {
    dependsOn 'classes'
    mainClass = 'klik.Klik_application'

    // Java VM RAM size options:

    // if you have only 2GB or not much more:
    //applicationDefaultJvmArgs = ["-Xms1G"]

    // if you have a lot of RAM say 64GB or more
    applicationDefaultJvmArgs = ["-Xms50G","-Xmx50G"]
    //applicationDefaultJvmArgs = ["-Xms50G","-Xmx50G","-XX:+UseZGC","-XX:StartFlightRecording:filename=recording.jfr,duration=90s"]
    //applicationDefaultJvmArgs = ["-Xms50G","-Xmx50G","-XX:+UseZGC","-XX:StartFlightRecording:filename=recording.jfr"]


    classpath = sourceSets.main.runtimeClasspath
    group = 'applications'
}
tasks.register('image_viewer', JavaExec) {
    dependsOn 'classes'
    mainClass = 'klik.images.Image_viewer_application'
    classpath = sourceSets.main.runtimeClasspath
    group = 'applications'
}
tasks.register('audio_player', JavaExec) {
    dependsOn 'classes'
    mainClass = 'klik.audio.Audio_player'
    classpath = sourceSets.main.runtimeClasspath
    group = 'applications'
}

tasks.register('TCP_server', JavaExec) {
    dependsOn 'classes'
    mainClass = 'klik.util.tcp.TCP_server'
    classpath = sourceSets.main.runtimeClasspath
    group = 'unit tests'
}
tasks.register('TCP_client', JavaExec) {
    dependsOn 'classes'
    mainClass = 'klik.util.tcp.TCP_client'
    classpath = sourceSets.main.runtimeClasspath
    group = 'unit tests'
}




def main_class_name = 'klik.Launcher'
application {
    //mainModule = 'klikmodule'
    mainClass = main_class_name

}

run{
    standardInput = System.in
    classpath = sourceSets.main.runtimeClasspath
}


tasks.register('klik_the_jar', Jar) {
    manifest {
        attributes('Main-Class': 'klik.Klik_application')
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
        sourceSets.main.output
    }
    exclude 'META-INF/*.SF', 'META-INF/*.DSA', 'META-INF/*.RSA'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    archiveBaseName.set('Klik')
    archiveVersion.set('1.0')
    destinationDirectory.set(layout.buildDirectory.dir("libs"))
}

tasks.named('build'){
    dependsOn tasks.named('klik_the_jar')
}