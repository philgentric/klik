Enable_auto_purge_disk_caches_explanation=Ogni 10 minuti, controlla i file nelle cache con pi\u00F9 di 2 giorni e elimina quelli pi\u00F9 vecchi (richiede riavvio di klik)
Enable_backup=Abilita backup
Enable_backup_explanation=Abilita il backup 'intelligente' di intere cartelle aprendo 2 finestre di navigazione, selezionando una come cartella sorgente e l'altra come cartella di destinazione, poi facendo clic sul pulsante di backup. 'Intelligente' significa che verranno copiati solo i file non gi\u00E0 presenti nella cartella di destinazione, rinominandoli in caso di conflitto \= non elimina nulla.
Enable_bit_level_deduplication=Abilita la riduzione delle copie dei file con confronto a livello di bit
Enable_bit_level_deduplication_explanation=Abilita la deduplicazione dei file con confronto a livello di bit dell'identit\u00E0 del file, ossia identit\u00E0 esatta dei dati nel file
Enable_change_events=Abilita eventi di modifica
Enable_corrupted_images_removal=Abilita la rimozione delle immagini corrotte (sperimentale)
Enable_corrupted_images_removal_explanation=Abilita un'opzione del menu per la rimozione di immagini corrotte (sperimentale). Sposta nel cestino i file il cui nome inizia con '._', quindi verifica se l'estensione \u00E8 di un tipo immagine noto; in caso affermativo, tenta di estrarre i metadati utilizzando il lettore EXIF. Se questo tentativo fallisce, il file viene spostato nel cestino. Potrebbe spostare nel cestino anche immagini valide con header EXIF corrotti. Naturalmente, puoi recuperarle dalla cartella del cestino.
Enable_detailed_cache_cleaning_options=Abilita opzioni di pulizia della cache dettagliata
Enable_detailed_cache_cleaning_options_explanation=Abilita opzioni dettagliate di pulizia della cache nel menu 'Strumenti', per rimuovere cache specifiche come le propriet\u00E0 delle immagini, la somiglianza, ecc.
Enable_different_image_scaling=Abilita scala delle immagini alternativa (predefinito\: lascia che la piattaforma gestisca)
Enable_face_recognition=Abilita il riconoscimento facciale
Enable_fusk=Abilita fusk (semplice offuscazione dei file)
Enable_fusk_explanation=Offuscazione file con un codice PIN\: sia il contenuto del file che i nomi dei file vengono offuscati. Questo \u00E8 destinato a persone paranoiche che memorizzano elementi su cloud o su dischi non crittografati (in particolare esterni). NON UTILIZZARE per dati/immagini super confidenziali\!\!\! poich\u00E9 si tratta di un'offuscazione e NON di una crittografia robusta (consulta il codice). Questo metodo \u00E8 sufficiente contro il cracker medio che ti ha rubato il dispositivo o le credenziali cloud. Per maggiore sicurezza, puoi registrare una frase di accesso diversa da quella predefinita nel codice sorgente, che, unitamente al codice PIN, costituisce la chiave di crittografia. A tal fine, nella cartella .klik, crea un file denominato '.passphrase.txt' e scrivi la tua frase di accesso al suo interno. In tutti i casi, assicurati di eseguire il backup del PIN (e della passphrase se l'hai modificata) poich\u00E9 NON C'\u00C8 ALLENAMENTO (a meno che tu non sia un esperto con il giusto hardware e molto tempo) per recuperare i tuoi dati se li dimentichi o li perdi. La selezione di questa opzione attiver\u00E0 un nuovo menu 'Fusk' nel menu a discesa 'File'.
Enable_image_playlists=Abilita playlist delle immagini
Enable_image_similarity=Abilita la similitudine delle immagini
Enable_name_cleaning=Abilita pulizia dei nomi
Enable_name_cleaning_explanation=Abilita pulizia dei nomi (sperimentale), ovvero rimuovi i caratteri speciali dai nomi dei file, sostituisci gli spazi con underscore, ecc. Questo \u00E8 utile per assicurarsi che i nomi dei file siano compatibili con tutti i sistemi e le applicazioni.
