Enable_recursive_empty_folders_removal_explanation=Quando si cercano cartelle vuote da rimuovere, scendere ricorsivamente (questo potrebbe essere 'pericoloso' se un'applicazione si affida a una cartella vuota come alcun tipo di elemento di configurazione?)
