Enable_fusk=Aktiviere Fusk (einfache Dateiverschleierung)
Enable_fusk_explanation=Dateiverschleierung mit einer PIN\: Sowohl der Dateiinhalt als auch die Dateinamen werden verschleiert. Dies ist f\u00FCr misstrauische Personen gedacht, wenn sie Dateien in der Cloud oder auf nicht verschl\u00FCsselten (insbesondere externen) Laufwerken speichern. NICHT VERWENDEN f\u00FCr super vertrauliche Daten/Bilder\!\!\!, da dies KEINE starke Verschl\u00FCsselung ist (siehe den Code). Dies soll ausreichen, um durchschnittliche Diebe, die Ihre Hardware oder Cloud-Zugangsdaten gestohlen haben, abzuwehren. F\u00FCr zus\u00E4tzliche Sicherheit k\u00F6nnen Sie ungeniert eine andere Pass-Phrase als die Standard-Pass-Phrase im Quellcode aufzeichnen, die zusammen mit der PIN den Verschl\u00FCsselungsschl\u00FCssel bildet. Dazu erstellen Sie im .klik-Verzeichnis eine Datei namens '.passphrase.txt' und schreiben Ihre Pass-Phrase hinein. In allen F\u00E4llen stellen Sie sicher, dass Sie die PIN (und die Pass-Phrase, falls Sie sie ge\u00E4ndert haben) sichern, denn es GIBT KEINE M\u00D6GLICHKEIT (es sei denn, Sie sind ein Experte mit der richtigen Hardware und viel Zeit), Ihre Daten wiederherzustellen, wenn Sie sie vergessen/verloren haben. Die Auswahl dieser Option aktiviert ein neues 'Fusk'-Men\u00FC im 'Dateien'-Drop-down.
