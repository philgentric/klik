Enable_corrupted_images_removal_explanation=Aktivieren eines Men\u00FCelements zur Entfernung besch\u00E4digter Bilder (experimentell). Es verschiebt Dateien in den Papierkorb, deren Name mit '._' beginnt, und \u00FCberpr\u00FCft anschlie\u00DFend, ob die Dateierweiterung ein bekannter Bildtyp ist. Extrahiert bei Erfolg die Metadaten mithilfe des EXIF-Readers. Falls dies fehlschl\u00E4gt, wird die Datei in den Papierkorb verschoben. Es kann g\u00FCltige Bilder mit besch\u00E4digtem EXIF-Header ebenfalls in den Papierkorb verschieben. Nat\u00FCrlich k\u00F6nnen Sie diese im Papierkorb wiederherstellen.
