Enable_backup=Aktiviere Backup
Enable_backup_explanation=Aktiviere die intelligente Sicherung ganzer Ordner, indem du zwei Dateibrowser-Fenster \u00F6ffnest, eines als Quellordner und das andere als Zielordner ausw\u00E4hlst und auf den Sicherungsknopf klickst. 'Intelligent' bedeutet, dass nur Dateien kopiert werden, die sich nicht bereits im Zielordner befinden, und bei Namenskonflikten umbenannt werden; es wird nichts gel\u00F6scht.
