Enable_backup=Ativar backup
Enable_backup_explanation=Ativar c\u00F3pia inteligente de pastas inteiras abrindo 2 janelas de navega\u00E7\u00E3o, selecionando uma como pasta de origem e outra como pasta de destino, e depois clicando no bot\u00E3o de reserva. 'inteligente' significa que s\u00F3 copiar\u00E1 ficheiros que n\u00E3o estejam j\u00E1 presentes na pasta de destino, alterando nomes em caso de colis\u00E3o \= nunca apaga nada.
