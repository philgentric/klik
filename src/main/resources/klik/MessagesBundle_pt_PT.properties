Enable_bit_level_deduplication_explanation=Ativar desduplica\u00E7\u00E3o de ficheiros com compara\u00E7\u00E3o ao n\u00EDvel de bits da identidade exata dos dados no ficheiro
Enable_change_events=Ativar eventos de altera\u00E7\u00E3o
Enable_corrupted_images_removal=Ativar remo\u00E7\u00E3o de imagens corrompidas (experimental)
Enable_corrupted_images_removal_explanation=Ativar um item de menu para a remo\u00E7\u00E3o de imagens corrompidas (experimental). Move para a lixeira arquivos cujo nome come\u00E7a com '._', depois verifica se a extens\u00E3o \u00E9 de um tipo de imagem conhecido, caso seja, tenta extrair os metadados usando o leitor EXIF. Se isso falhar, o arquivo \u00E9 movido para a lixeira. Pode mover para a lixeira imagens v\u00E1lidas com cabe\u00E7alho EXIF corrompido. Mas claro que voc\u00EA pode recuper\u00E1-las na pasta da lixeira.
Enable_detailed_cache_cleaning_options=Ativar op\u00E7\u00F5es de limpeza detalhada do cache
Enable_detailed_cache_cleaning_options_explanation=Ativar op\u00E7\u00F5es detalhadas de limpeza de cache no menu 'Ferramentas', permitindo limpar caches espec\u00EDficos como propriedades de imagem, semelhan\u00E7a, etc.
Enable_different_image_scaling=Ativar dimensionamento de imagem alternativo (padr\u00E3o\: deixar que a plataforma fa\u00E7a isso)
Enable_face_recognition=Ativar reconhecimento facial
Enable_fusk=Ativar fusk (simplifica\u00E7\u00E3o de ofusca\u00E7\u00E3o de ficheiros)
Enable_fusk_explanation=Ofusca\u00E7\u00E3o de ficheiros com um c\u00F3digo PIN\: tanto o conte\u00FAdo dos ficheiros quanto os nomes dos ficheiros s\u00E3o ofuscados. Isto destina-se a pessoas paran\u00F3icas ao armazenar itens na nuvem ou em unidades n\u00E3o encriptadas (especialmente externas). N\u00C3O USE para dados/imagens super confidenciais\!\!\! pois isto N\u00C3O \u00E9 uma encripta\u00E7\u00E3o forte (verifique o c\u00F3digo). Este recurso pretende ser suficientemente seguro contra o ladr\u00E3o m\u00E9dio que roubou seu hardware ou suas credenciais de nuvem. Para maior seguran\u00E7a, sinta-se \u00E0 vontade para gravar uma frase-passe diferente da padr\u00E3o no c\u00F3digo-fonte, que, juntamente com o c\u00F3digo PIN, forma a chave de encripta\u00E7\u00E3o. Para isso, na pasta '.klik', crie um ficheiro denominado '.passphrase.txt' e escreva sua frase-passe nele. Em todos os casos, certifique-se de fazer backup do c\u00F3digo PIN (e da frase-passe se voc\u00EA a alterou), pois N\u00C3O H\u00C1 FORMA (a menos que voc\u00EA seja um expert com o hardware certo e muito tempo) para recuperar seus dados se esqueceu/perdeu. A sele\u00E7\u00E3o desta op\u00E7\u00E3o ativar\u00E1 um novo menu 'Fusk' na drop-down 'Ficheiros'.
