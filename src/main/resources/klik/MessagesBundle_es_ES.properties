Enable_backup=Activar respaldo
Enable_backup_explanation=Activar la copia de seguridad 'inteligente' de carpetas completas abriendo 2 ventanas de navegaci\u00F3n, seleccionando una como la carpeta origen y la otra como la carpeta destino, y luego haciendo clic en el bot\u00F3n de copia de seguridad. 'Inteligente' significa que solo copiar\u00E1 los archivos que no est\u00E9n ya presentes en la carpeta destino, cambiando nombres en caso de colisi\u00F3n \= nunca elimina nada.
Enable_bit_level_deduplication=Activar deduplicaci\u00F3n de archivos con comparaci\u00F3n a nivel de bits
Enable_bit_level_deduplication_explanation=Habilitar desduplicaci\u00F3n de archivos mediante comparaci\u00F3n a nivel de bits de la identidad exacta de los datos en el archivo
Enable_change_events=Activar eventos de cambio
Enable_corrupted_images_removal=Activar eliminaci\u00F3n de im\u00E1genes corruptas (experimental)
Enable_corrupted_images_removal_explanation=Habilitar un elemento del men\u00FA para la eliminaci\u00F3n de im\u00E1genes corruptas (experimental). Mueve a la papelera los archivos cuyo nombre comienza con '._', luego verifica si la extensi\u00F3n es un tipo de imagen conocido, y si es as\u00ED, intenta extraer los metadatos utilizando el lector EXIF. Si eso falla, el archivo se mueve a la papelera. Es posible que se muevan a la papelera im\u00E1genes v\u00E1lidas con una cabecera EXIF corrupta. Pero por supuesto que puedes recuperarlos en la carpeta de papelera.
Enable_detailed_cache_cleaning_options=Activar opciones de limpieza detallada del cach\u00E9
Enable_detailed_cache_cleaning_options_explanation=Habilitar opciones detalladas de limpieza de cach\u00E9 en el men\u00FA 'Herramientas', permitiendo limpiar cach\u00E9s espec\u00EDficos como propiedades de imagen, similitud, etc.
Enable_different_image_scaling=Habilitar escalado de im\u00E1genes alternativo (predeterminado\: que la plataforma lo haga)
Enable_face_recognition=Activar reconocimiento facial
Enable_fusk=Activar fusk (obfuscaci\u00F3n de archivos sencillos)
Enable_fusk_explanation=Ofuscaci\u00F3n de archivos con un c\u00F3digo de acceso\: tanto el contenido como los nombres de los archivos quedan ofuscados. Esto est\u00E1 destinado a personas paranoides cuando almacenan elementos en la nube o en unidades no cifradas (especialmente externas). NO UTILICE esto para datos/im\u00E1genes superconfidenciales, ya que esto NO es una encriptaci\u00F3n fuerte (consulte el c\u00F3digo). Est\u00E1 dise\u00F1ado para ser lo suficientemente seguro contra el delincuente com\u00FAn que le robe el hardware o las credenciales de la nube. Para mayor seguridad, si\u00E9ntase libre de grabar una frase de paso diferente a la predeterminada en el c\u00F3digo fuente, que, junto con el c\u00F3digo de acceso, forma la clave de encriptaci\u00F3n. Para ello, en la carpeta .klik, cree un archivo llamado '.passphrase.txt' y escriba su frase de paso en \u00E9l. En todos los casos, aseg\u00FArese de respaldar el c\u00F3digo de acceso (y la frase de paso si la cambi\u00F3), ya que NO HAY MANERA (a menos que sea un experto con el hardware adecuado y mucho tiempo) de recuperar sus datos si los olvid\u00F3/perdi\u00F3. Seleccionar esta opci\u00F3n activar\u00E1 un nuevo men\u00FA 'Fusk' en el men\u00FA desplegable de 'Archivos'.
