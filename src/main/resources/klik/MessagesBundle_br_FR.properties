Enable_fusk=Gall fusk (simpl restrenn kuzhatadur)
Enable_fusk_explanation=Obfuscadur restr dre ar pin-tro \: kement ha n'eus ket an anvio\u00F9 restr emgefre an obfuscadur. Evit an dud paranoialek pa vez o'n embregi\u00F1 danvez e goulo\u00F9 pe war roudouro\u00F9 n'int ket enkoded (dreist-holl diabarzh). NA ZIBAB KENTOC'H evit ar data/danio\u00F9 arc'hoazius-tre\!\!\! abalamour ma n'eo ket ur c'hwechennadur strong (sellet ouzh ar c'hod). N'eo ket evit a zo mat a-walc'h a-enep an dud bohemian kaset da brennga\u00F1 ho hardware pe ho gredonio\u00F9 cloud. Evit un surentez ouzhpenn, fell dra free to record a different pass-phrase than the default one in the source code, which, with the pin code, forms the encryption key. For this, in the .klik folder, create a file named '.passphrase.txt' and write your passphrase in it. In all cases, make sure to back up the pincode (and the passphrase if you changed it) as there is NO WAY (unless you are an expert with the right hardware and a lot of time) to recover your data if you forgot/lost it Selecting this option will activate a new 'Fusk' menu in the 'Files' drop-down.
