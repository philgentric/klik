Enable_corrupted_images_removal_explanation=Gallout a ra menubi\u00F1 evit dileuria\u00F1 skeudenno\u00F9 gwallc'hoariet (drei\u00F1 an argerzh). Kaset e vo d'an toulla\u00F1 ar restro\u00F9 en o deus un anv o kregi\u00F1 gant '._', neuze e tapo lampo\u00F9 ez eo an astenn ur seurt skeudenn anavet, mar bezan, e klask termeni\u00F1 al lampo\u00F9 metadata gant al lenner EXIF, mar c'hwit an argerzh, kaset e vo ar rest d'an toulla\u00F1. C'hall lodenna\u00F1 skeudenno\u00F9 gwirion gant pennado\u00F9 EXIF gwallc'hoariet. Met gellit o adkavout er rastell.
