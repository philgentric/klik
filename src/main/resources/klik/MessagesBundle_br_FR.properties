Enable_backup=Gallout saochn
Enable_backup_explanation=Gallout a 'fri' gehe\u00F1chenna\u00F1 renkello\u00F9 a-bezh dre digeri\u00F1 2 prenestro a-zeho\u00F9, ober an hini kenta\u00F1 evel mammenn ha eben evel renkell destina\u00F1, ha neuze klask war ar bouton gehe\u00F1chenna\u00F1. 'fri' a dalvez evit lavarout ne vez kopiet nemet ar restro\u00F9 n'eus ket anezho c'hoazh er renkell destina\u00F1, o che\u00F1ch anv en kas ma krog ar stlenno\u00F9 \= nep prenas netra.
