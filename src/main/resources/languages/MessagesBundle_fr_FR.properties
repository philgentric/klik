Show_ffmpeg_install_warning_explanation=Afficher un avertissement si ffmpeg n'est pas install\u00E9, car il est n\u00E9cessaire pour certaines fonctionnalit\u00E9s de traitement vid\u00E9o. Vrai par d\u00E9faut.
