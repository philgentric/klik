File_ML_similarity_deduplication=Fichier ML de d\u00E9duplication par similarit\u00E9
File_ML_similarity_deduplication_explanation=Suppression des doublons bas\u00E9e sur la similarit\u00E9 par apprentissage automatique, c'est-\u00E0-dire les fichiers qui sont similaires mais pas identiques (par exemple, diff\u00E9rentes versions de la m\u00EAme image, redimensionn\u00E9es, d\u00E9coup\u00E9es) peuvent \u00EAtre d\u00E9tect\u00E9s comme 'similaires'. Ce moteur de recherche n'est pas r\u00E9cursif \: il ne cherche que dans le dossier actuel. La mise en cache le rend beaucoup plus rapide apr\u00E8s le premier passage.
