Enable_auto_purge_disk_caches=Purge automatique des caches d'ic\u00F4nes du disque
Enable_auto_purge_disk_caches_explanation=Toutes les 10 minutes, v\u00E9rifiez les fichiers dans le cache dont l'\u00E2ge est sup\u00E9rieur \u00E0 2 jours et supprimez-les (n\u00E9cessite un red\u00E9marrage de klik)
Enable_backup=Activer la sauvegarde
Enable_backup_explanation=Activer la sauvegarde 'intelligente' de dossiers entiers en ouvrant 2 fen\u00EAtres de navigation, en s\u00E9lectionnant l'une comme source et l'autre comme dossier de destination, puis en cliquant sur le bouton de sauvegarde. 'Intelligent' signifie qu'il ne copiera que les fichiers non d\u00E9j\u00E0 pr\u00E9sents dans le dossier de destination, en modifiant les noms en cas de collision \= ne supprime jamais rien.
Enable_bit_level_deduplication=Activer la d\u00E9duplication de fichiers avec comparaison au niveau du bit
Enable_bit_level_deduplication_explanation=Activer la d\u00E9duplication des fichiers avec comparaison au niveau du bit de l'identit\u00E9 des fichiers, c'est-\u00E0-dire identit\u00E9 exacte des donn\u00E9es dans le fichier
Enable_change_events=Activer les \u00E9v\u00E8nements de changement
Enable_corrupted_images_removal=Activer la suppression des images corrompues (exp\u00E9rimental)
Enable_corrupted_images_removal_explanation=Activer un \u00E9l\u00E9ment de menu pour la suppression des images corrompues (exp\u00E9rimental). Il d\u00E9place dans la corbeille les fichiers dont le nom commence par '._', puis il v\u00E9rifie si l'extension est un type d'image connu. Si c'est le cas, il tente d'extraire les m\u00E9tadonn\u00E9es \u00E0 l'aide du lecteur EXIF. En cas d'\u00E9chec, le fichier est d\u00E9plac\u00E9 dans la corbeille. Il se peut que des images valides avec un en-t\u00EAte EXIF corrompu soient \u00E9galement d\u00E9plac\u00E9es dans la corbeille. Cependant, vous pouvez bien s\u00FBr les r\u00E9cup\u00E9rer dans le dossier de la corbeille.
Enable_detailed_cache_cleaning_options=Activer les options de nettoyage d\u00E9taill\u00E9es du cache
Enable_detailed_cache_cleaning_options_explanation=Activer les options de nettoyage d\u00E9taill\u00E9 du cache dans le menu 'Outils', permettant de supprimer des caches sp\u00E9cifiques comme les propri\u00E9t\u00E9s d'image, la similarit\u00E9, etc.
Enable_different_image_scaling=Activer un redimensionnement d'image alternatif (par d\u00E9faut \: laisser le syst\u00E8me d'exploitation g\u00E9rer)
Enable_face_recognition=Activer la reconnaissance faciale
Enable_fusk=Activer fusk (obfuscation simple de fichiers)
Enable_fusk_explanation=Obfuscation des fichiers avec un code PIN \: \u00E0 la fois le contenu des fichiers et leurs noms sont obfusqu\u00E9s. Cela est destin\u00E9 aux personnes parano\u00EFaques lors du stockage de donn\u00E9es dans le cloud ou sur des disques non chiffr\u00E9s (sp\u00E9cialement externes). NE UTILISEZ PAS pour des donn\u00E9es/images super confidentielles \!\!\! car il ne s'agit PAS d'un chiffrement fort (consultez le code). Cela est cens\u00E9 \u00EAtre suffisamment s\u00E9curis\u00E9 contre le pirate moyen qui vous a vol\u00E9 votre mat\u00E9riel ou vos identifiants cloud. Pour une s\u00E9curit\u00E9 suppl\u00E9mentaire, n'h\u00E9sitez pas \u00E0 enregistrer une phrase secr\u00E8te diff\u00E9rente de celle par d\u00E9faut dans le code source, qui, avec le code PIN, forme la cl\u00E9 de chiffrement. Pour ce faire, dans le dossier .klik, cr\u00E9ez un fichier nomm\u00E9 '.passphrase.txt' et inscrivez-y votre phrase secr\u00E8te. Dans tous les cas, assurez-vous de sauvegarder le code PIN (et la phrase secr\u00E8te si vous l'avez modifi\u00E9e) car pour r\u00E9cup\u00E9rer vos donn\u00E9es si vous les oubliez/les perdez, la seule solution est de faire une attaque. Si vous avez oubli\u00E9 le pin code \u00E0 4 chiffres, une attaque de forte brute est facile et faisable, mais si vous avez aussi oubli\u00E9/perdu la phrase secr\u00E8te... Comment dire ?.\n La s\u00E9lection de cette option activera un nouveau menu 'Fusk' dans le menu d\u00E9roulant 'Fichiers'.
Enable_image_playlists=Activer les playlists d'images
Enable_image_similarity=Activer la similitude d'image
Enable_name_cleaning=Activer le nettoyage des noms
Enable_name_cleaning_explanation=Activer le nettoyage des noms (exp\u00E9rimental), c'est-\u00E0-dire supprimer les caract\u00E8res sp\u00E9ciaux des noms de fichiers, remplacer les espaces par des tirets bas, etc. Cela est utile pour s'assurer que les noms de fichiers sont compatibles avec tous les syst\u00E8mes et applications.
