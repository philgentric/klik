Show_manual_about_face_reco=Afficher le manuel sur le d\u00E9marrage des serveurs de reconnaissance faciale
Show_manual_about_face_reco_explanation=Afficher le manuel sur la mani\u00E8re de d\u00E9marrer les serveurs de reconnaissance faciale. Copiez la ligne de commande et collez-la dans un terminal pour d\u00E9marrer les serveurs de reconnaissance faciale. Les serveurs fonctionnent de mani\u00E8re ind\u00E9pendante de klik et du Lanceur, donc vous n'aurez \u00E0 le faire qu'une seule fois apr\u00E8s un red\u00E9marrage.
Show_manual_about_image_similarity=Afficher le manuel sur la similitude des images
Show_manual_about_image_similarity_explanation=Afficher un manuel sur la mani\u00E8re de d\u00E9marrer les serveurs de similarit\u00E9 d'images. Copiez la ligne de commande et collez-la dans un shell pour d\u00E9marrer les serveurs de similarit\u00E9 d'images. Les serveurs s'ex\u00E9cutent ind\u00E9pendamment de klik et du Lanceur, il n'est donc n\u00E9cessaire de le faire qu'une seule fois apr\u00E8s un red\u00E9marrage.
