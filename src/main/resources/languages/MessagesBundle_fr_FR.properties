Show_hidden_files=Afficher les fichiers cach\u00E9s
Show_hidden_files_explanation=Afficher les fichiers cach\u00E9s (noms commen\u00E7ant par un point .). Cela est utile pour les utilisateurs avanc\u00E9s souhaitant voir tous les fichiers, mais peut \u00EAtre ennuyeux pour les d\u00E9butants.
Show_hidden_folders=Afficher les dossiers cach\u00E9s
Show_hidden_folders_explanation=Afficher les dossiers cach\u00E9s (noms commen\u00E7ant par un point .). Cela est utile pour les utilisateurs avanc\u00E9s souhaitant voir tous les dossiers, mais peut \u00EAtre ennuyeux pour les d\u00E9butants.
