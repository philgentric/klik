Add_all_images_to_face_recognition_training_set_explanation=Ajouter toutes les images du dossier actuel \u00E0 l'ensemble d'entra\u00EEnement de reconnaissance faciale. Ceci est utile pour entra\u00EEner le syst\u00E8me de reconnaissance faciale sur un ensemble sp\u00E9cifique d'images SI le 'tag' (par exemple, le nom de la personne) est sp\u00E9cifi\u00E9 \! Par d\u00E9faut, le nom du dossier sera utilis\u00E9 comme 'tag'. Par exemple, si le nom du dossier est 'granma', toutes les images de ce dossier seront ajout\u00E9es \u00E0 l'ensemble d'entra\u00EEnement avec le tag 'granma'. Attention, ces images DOIVENT contenir un seul visage, car il n'y a pas de contr\u00F4le sur quel visage sera d\u00E9tect\u00E9 en premier par le syst\u00E8me de d\u00E9tection faciale.
