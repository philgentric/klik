File_bit_exact_deduplication=D\u00E9duplication exacte des fichiers
File_bit_exact_deduplication_explanation=D\u00E9duplication de fichiers bas\u00E9e sur une comparaison exacte au niveau du bit, c'est-\u00E0-dire que les fichiers identiques en contenu (et \u00E9ventuellement diff\u00E9rents en nom) seront d\u00E9tect\u00E9s comme 'dupliqu\u00E9s'. Ce moteur de recherche est R\u00C9CURSIF \: \u00E9tant donn\u00E9 un dossier, il recherchera des doublons dans tous les sous-dossiers.
