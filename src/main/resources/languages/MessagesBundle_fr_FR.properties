Fusk_is_on_explanation=Fusk fonctionne avec une activation en deux \u00E9tapes. Tout d'abord, activez-le pour acc\u00E9der aux menus, puis r\u00E9glez-le sur ACTIV\u00C9 ou D\u00C9SACTIV\u00C9 soit dans le menu, soit dans les pr\u00E9f\u00E9rences. Si ACTIV\u00C9, les fichiers fusked seront d\u00E9obfuscation en temps r\u00E9el (en RAM) et s'afficheront comme des images normales ; si D\u00C9SACTIV\u00C9, les fichiers fusked ne s'affichent pas avec une ic\u00F4ne et ne sont pas visibles dans la fen\u00EAtre d'images.
